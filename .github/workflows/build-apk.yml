name: Build Android APK

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'artifacts/mobile/**'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'artifacts/mobile/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js with pnpm
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          package-manager: 'pnpm'
          package-manager-version: 'latest'

      - name: Install dependencies (root)
        run: pnpm install --no-frozen-lockfile

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install mobile dependencies
        working-directory: artifacts/mobile
        run: pnpm install --no-frozen-lockfile

      - name: Decode keystore
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/'))
        run: |
          mkdir -p artifacts/mobile/android/app
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 -d > artifacts/mobile/android/app/release.keystore
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}

      - name: Build debug APK
        if: github.event_name == 'pull_request'
        working-directory: artifacts/mobile/android
        run: ./gradlew assembleDebug
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      - name: Build release APK
        if: github.event_name != 'pull_request'
        working-directory: artifacts/mobile/android
        run: ./gradlew assembleRelease
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          KEYSTORE_PATH: ${{ github.workspace }}/artifacts/mobile/android/app/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload debug APK to artifacts
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: android-debug-apk
          path: artifacts/mobile/android/app/build/outputs/apk/debug/
          if-no-files-found: ignore

      - name: Upload release APK to artifacts
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: android-release-apk
          path: artifacts/mobile/android/app/build/outputs/apk/release/
          if-no-files-found: ignore

      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/mobile/android/app/build/outputs/apk/release/*.apk
          body: |
            ## Release APK
            
            Download the Android APK from the assets below.
            
            **Version:** ${{ github.ref_name }}
            **Build Date:** ${{ github.event.head_commit.timestamp }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up keystore
        if: always()
        run: rm -f artifacts/mobile/android/app/release.keystore

      - name: Notify Build Status (Slack)
        if: always() && secrets.SLACK_WEBHOOK != ''
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: 'APK Build ${{ job.status }}: ${{ github.repository }} - ${{ github.ref_name }}'
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        continue-on-error: true
