name: Build Android APK (Gradle)

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'artifacts/mobile/**'
      - '.github/workflows/build-apk.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'artifacts/mobile/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install mobile dependencies with npm
        working-directory: artifacts/mobile
        run: |
          npm install --legacy-peer-deps
        env:
          npm_config_legacy_peer_deps: true

      - name: Decode keystore (Release builds only)
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/tags/'))
        run: |
          mkdir -p artifacts/mobile/android/app
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 -d > artifacts/mobile/android/app/release.keystore

      - name: Build debug APK (for PRs)
        if: github.event_name == 'pull_request'
        working-directory: artifacts/mobile/android
        run: ./gradlew assembleDebug --stacktrace
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      - name: Build release APK (for main/develop/tags)
        if: github.event_name != 'pull_request'
        working-directory: artifacts/mobile/android
        run: ./gradlew assembleRelease --stacktrace
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          KEYSTORE_PATH: ${{ github.workspace }}/artifacts/mobile/android/app/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload debug APK
        if: github.event_name == 'pull_request' && always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: artifacts/mobile/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: ignore

      - name: Upload release APK
        if: github.event_name != 'pull_request' && always()
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: artifacts/mobile/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: ignore

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/mobile/android/app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup keystore
        if: always()
        run: rm -f artifacts/mobile/android/app/release.keystore
